# This is a Databricks asset bundle definition for book_orders_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: book_orders_project
  uuid: 0eba445c-9c8c-41b6-81a9-0ee5d1691d23

include:
  - resources/*.yml
  - resources/*/*.yml 

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: hilton_hotmail
  schema:
    description: The schema to use
    default: dev

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-3a9c6033-1f4e.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-3a9c6033-1f4e.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/hma68@hotmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/hma68@hotmail.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: hma68@hotmail.com
        level: CAN_MANAGE
