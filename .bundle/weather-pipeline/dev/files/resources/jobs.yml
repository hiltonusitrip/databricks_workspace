resources:
  jobs:
    ingest_weather_job:
      name: ingest-weather-${bundle.target}

      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: "UTC"
        pause_status: ${var.job_pause_status}

      tasks:
        - task_key: ingest_weather
          spark_python_task:
            python_file: ../src/weather_api.py
            parameters:
              - --catalog
              - ${var.catalog}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
