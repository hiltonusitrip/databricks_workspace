name: Databricks Incremental Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      WORKSPACE_PATH: /Workspace/Users/hma68@hotmail.com/

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Databricks CLI (new)
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Get changed files
        run: |
          git diff --name-status HEAD~1 HEAD > changes.txt
          echo "Changed files:"
          cat changes.txt

      - name: Delete removed files
        run: |
          while read status file; do
            if [ "$status" = "D" ]; then
              TARGET="${WORKSPACE_PATH}/$file"
              echo "Deleting $TARGET"
              databricks workspace delete "$TARGET" || true
            fi
          done < changes.txt

      - name: Upload changed files
        run: |
          while read status file; do
            TARGET="${WORKSPACE_PATH}/$file"

            if [[ "$file" != *.py && "$file" != *.sql && "$file" != *.ipynb && "$file" != *.scala && "$file" != *.r ]]; then
              echo "Skipping unsupported file type: $file"
              continue
            fi

            if [ "$status" = "A" ] || [ "$status" = "M" ]; then
              echo "Uploading $file → $TARGET"

              # Create directory if needed
              databricks workspace mkdirs "$(dirname "$TARGET")"

            fi
          done < changes.txt
