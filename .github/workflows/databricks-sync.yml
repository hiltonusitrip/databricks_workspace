name: Databricks Incremental Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      WORKSPACE_PATH: /Workspace/Users/hma68@hotmail.com/databricks_workspace

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli


      - name: Get changed files
        run: |
          git diff --name-status HEAD~1 HEAD > changes.txt
          echo "Changed files:"
          cat changes.txt

      - name: Delete removed files
        run: |
          while read status file; do
            if [ "$status" = "D" ]; then
              TARGET="${WORKSPACE_PATH}/$file"
              echo "Deleting $TARGET"
              databricks workspace delete "$TARGET" || true
            fi
          done < changes.txt

      - name: Upload changed files
        run: |
          while read status file; do
            TARGET="${WORKSPACE_PATH}/$file"

            if [ "$status" = "A" ] || [ "$status" = "M" ]; then
              echo "Uploading $file → $TARGET"

              # Create directory if needed
              databricks workspace mkdirs "$(dirname "$TARGET")"

              databricks workspace import \
                "$file" \
                "$TARGET" \
                --format SOURCE \
                --overwrite
            fi
          done < changes.txt
