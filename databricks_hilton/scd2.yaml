pipelines:
    scd_type2_pipeline:
      name: scd-type2-customer-pipeline
      target: gold
      development: false
      continuous: false

      libraries:
        - notebook:
            path: /Repos/data-platform/dlt/scd_type2_pipeline

      clusters:
        - label: default
          num_workers: 2
          autoscale:
            min_workers: 1
            max_workers: 4

      configuration:
        spark.sql.shuffle.partitions: "200"
        pipeline.env: "prod"
